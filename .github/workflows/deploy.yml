name: Deploy Project

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            cd ~/final-project

            git pull origin main

            docker build -t final-app .

            docker stop app || true
            docker rm app || true

            docker run -d -p 80:80 --name app final-app
